<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>展場控制台</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3345;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --green: #00d68f;
      --red: #ff6b6b;
      --orange: #ffa502;
      --blue: #4da6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 { font-size: 16px; font-weight: 600; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--green); }

    /* ---- Tab Bar ---- */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ---- Tab Content ---- */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* ---- Section ---- */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 10px;
      margin-top: 16px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ---- Device Cards ---- */
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .device-card {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid var(--border);
    }

    .device-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .device-name { font-weight: 600; font-size: 13px; }

    .status-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .status-badge.online { background: rgba(0,214,143,0.15); color: var(--green); }
    .status-badge.offline { background: rgba(255,107,107,0.15); color: var(--red); }
    .status-badge.connecting { background: rgba(255,165,2,0.15); color: var(--orange); }
    .status-badge.error { background: rgba(255,107,107,0.15); color: var(--red); }

    .device-type {
      font-size: 11px;
      color: var(--text-dim);
    }

    .device-extra {
      font-size: 11px;
      margin-top: 4px;
    }

    /* ---- Scene Buttons ---- */
    .scene-group-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin: 14px 0 8px;
    }
    .scene-group-label:first-child { margin-top: 0; }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .scene-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .scene-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .scene-btn:active { transform: scale(0.97); }
    .scene-btn.running {
      border-color: var(--green);
      box-shadow: 0 0 16px rgba(0,214,143,0.25);
    }

    .scene-btn .name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 2px;
    }
    .scene-btn .desc {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ---- Quick Actions (top) ---- */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .quick-btn {
      padding: 20px 12px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .quick-btn:active { transform: scale(0.96); }

    .quick-btn.start { background: var(--green); color: #0f1117; }
    .quick-btn.stop { background: var(--red); color: #fff; }

    /* ---- VTS Controls ---- */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { background: var(--accent); border-color: var(--accent); }
    .ctrl-btn:active { transform: scale(0.95); }
    .ctrl-btn.warn { border-color: var(--orange); }
    .ctrl-btn.danger { border-color: var(--red); }
    .ctrl-btn.on:hover { background: var(--green); border-color: var(--green); }
    .ctrl-btn.off:hover { background: var(--red); border-color: var(--red); }

    /* ---- Input Controls ---- */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }

    .slider-row .val {
      font-size: 13px;
      color: var(--text-dim);
      min-width: 32px;
      text-align: right;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .color-row input[type="color"] {
      width: 40px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* ---- Wiz Target Toggle ---- */
    .target-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .target-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .target-btn.active { background: var(--accent); border-color: var(--accent); }

    .wiz-status {
      font-size: 11px;
      color: var(--text-dim);
      padding: 8px 0;
    }

    /* ---- OBS Controls ---- */
    .obs-section {
      margin-bottom: 12px;
    }

    /* ---- Event Log ---- */
    .log-list {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid rgba(46,51,69,0.5);
      display: flex;
      gap: 8px;
    }

    .log-time {
      color: var(--text-dim);
      flex-shrink: 0;
      width: 65px;
    }

    .log-event {
      color: var(--blue);
      flex-shrink: 0;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-data {
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .log-clear {
      font-size: 12px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      float: right;
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      background: var(--accent);
      color: #fff;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { background: var(--green); color: #0f1117; }
    .toast.error { background: var(--red); color: #fff; }
  </style>
</head>
<body>

  <header>
    <h1>展場控制台</h1>
    <div class="header-right">
      <div class="conn-status" id="bridgeStatus" style="display:none">
        <div class="conn-dot" id="bridgeDot"></div>
        <span id="bridgeLabel">Bridge</span>
      </div>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">連線中…</span>
      </div>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" data-tab="scenes">場景</button>
    <button class="tab" data-tab="devices">裝置</button>
    <button class="tab" data-tab="vts">VTube Studio</button>
    <button class="tab" data-tab="wiz">Wiz 燈光</button>
    <button class="tab" data-tab="obs">OBS</button>
    <button class="tab" data-tab="camera">攝影機</button>
    <button class="tab" data-tab="log">日誌</button>
  </div>

  <!-- ==================== 場景 ==================== -->
  <div class="tab-content active" id="tab-scenes">
    <div class="quick-actions">
      <button class="quick-btn start" onclick="triggerScene('start')">開始</button>
      <button class="quick-btn stop" onclick="triggerScene('all_off')">全部關閉</button>
    </div>
    <div id="sceneContainer"></div>
  </div>

  <!-- ==================== 裝置 ==================== -->
  <div class="tab-content" id="tab-devices">
    <div class="section-title">裝置狀態</div>
    <div class="device-grid" id="deviceList"></div>
  </div>

  <!-- ==================== VTube Studio ==================== -->
  <div class="tab-content" id="tab-vts">
    <div class="section-title">表情</div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="vtsExpression('驚訝.exp3.json')">驚訝</button>
      <button class="ctrl-btn" onclick="vtsExpression('生氣.exp3.json')">生氣</button>
      <button class="ctrl-btn" onclick="vtsExpression('哀傷.exp3.json')">哀傷</button>
      <button class="ctrl-btn" onclick="vtsExpression('開心(睜眼).exp3.json')">開心(睜眼)</button>
      <button class="ctrl-btn" onclick="vtsExpression('開心(閉眼).exp3.json')">開心(閉眼)</button>
    </div>

    <div class="section-title">動畫 / Hotkey</div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="vtsHotkey('更換衣服')">更換衣服</button>
      <button class="ctrl-btn" onclick="vtsHotkey('吃飯手開關')">吃飯手開關</button>
      <button class="ctrl-btn" onclick="vtsHotkey('吃青菜')">吃青菜</button>
      <button class="ctrl-btn" onclick="vtsHotkey('吃完子')">吃丸子</button>
      <button class="ctrl-btn" onclick="vtsHotkey('不吃')">不吃</button>
      <button class="ctrl-btn" onclick="vtsHotkey('待機')">待機</button>
    </div>

    <div class="section-title">工具</div>
    <div class="btn-group">
      <button class="ctrl-btn warn" onclick="vtsRemoveAllExpressions()">移除全部表情</button>
      <button class="ctrl-btn" onclick="vtsHotkey('回歸原點')">回歸原點</button>
      <button class="ctrl-btn danger" onclick="vtsHotkey('模型重新加載')">模型重新加載</button>
    </div>

    <div class="section-title">移動模型</div>
    <div class="input-grid">
      <div class="input-group"><label>X</label><input type="number" id="vtsPosX" value="0" step="0.1"></div>
      <div class="input-group"><label>Y</label><input type="number" id="vtsPosY" value="0" step="0.1"></div>
      <div class="input-group"><label>旋轉</label><input type="number" id="vtsRot" value="0" step="1"></div>
      <div class="input-group"><label>大小</label><input type="number" id="vtsSize" value="0" step="1"></div>
    </div>
    <button class="ctrl-btn" onclick="vtsMoveModel()" style="width:100%">移動</button>

    <div class="section-title" style="margin-top:16px">染色模型</div>
    <div class="color-row">
      <input type="color" id="vtsTintColor" value="#ffffff">
      <button class="ctrl-btn" onclick="vtsTint()">套用</button>
      <button class="ctrl-btn" onclick="vtsTintReset()">重置</button>
    </div>
  </div>

  <!-- ==================== Wiz 燈光 ==================== -->
  <div class="tab-content" id="tab-wiz">
    <div class="section-title">目標</div>
    <div class="target-bar" id="wizTargetGroup">
      <button class="target-btn active" data-target="all" onclick="wizSetTarget('all')">全部</button>
    </div>

    <div class="section-title">電源</div>
    <div class="btn-group">
      <button class="ctrl-btn on" onclick="wizPower('on')" style="flex:1">開燈</button>
      <button class="ctrl-btn off" onclick="wizPower('off')" style="flex:1">關燈</button>
    </div>

    <div class="section-title">亮度</div>
    <div class="slider-row">
      <input type="range" id="wizBrSlider" min="10" max="100" value="100"
             oninput="document.getElementById('wizBrVal').textContent=this.value"
             onchange="wizBrightness(this.value)">
      <span class="val" id="wizBrVal">100</span>
    </div>

    <div class="section-title">顏色</div>
    <div class="color-row">
      <input type="color" id="wizColorPicker" value="#ff0000">
      <button class="ctrl-btn" onclick="wizColor()">套用顏色</button>
    </div>

    <div class="section-title">色溫</div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="wizTemp(2700)">暖光 2700K</button>
      <button class="ctrl-btn" onclick="wizTemp(4000)">自然 4000K</button>
      <button class="ctrl-btn" onclick="wizTemp(6500)">冷光 6500K</button>
    </div>

    <div class="section-title">燈光場景</div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="wizScene(1)">Ocean</button>
      <button class="ctrl-btn" onclick="wizScene(2)">Romance</button>
      <button class="ctrl-btn" onclick="wizScene(4)">Fireplace</button>
      <button class="ctrl-btn" onclick="wizScene(5)">Forest</button>
      <button class="ctrl-btn" onclick="wizScene(6)">Pastel</button>
      <button class="ctrl-btn" onclick="wizScene(9)">Party</button>
      <button class="ctrl-btn" onclick="wizScene(10)">Spring</button>
      <button class="ctrl-btn" onclick="wizScene(11)">Summer</button>
      <button class="ctrl-btn" onclick="wizScene(14)">Focus</button>
      <button class="ctrl-btn" onclick="wizScene(15)">Relax</button>
    </div>

    <div class="wiz-status" id="wizStatusBar">掃描中...</div>
  </div>

  <!-- ==================== OBS ==================== -->
  <div class="tab-content" id="tab-obs">
    <div class="section-title">場景切換</div>
    <div class="btn-group" id="obsSceneList">
      <button class="ctrl-btn" onclick="obsSwitch('VTuber')">VTuber</button>
      <button class="ctrl-btn" onclick="obsSwitch('Video')">Video</button>
    </div>

    <div class="section-title">複合場景</div>
    <div class="btn-group">
      <button class="ctrl-btn" onclick="triggerScene('obs_video_then_vtuber')">播影片 → 自動切 VTuber</button>
    </div>

    <div class="section-title">媒體播放</div>
    <div class="input-grid" style="margin-bottom:8px">
      <div class="input-group">
        <label>媒體來源名稱</label>
        <input type="text" id="obsMediaInput" value="Video" placeholder="OBS 媒體來源名稱">
      </div>
    </div>
    <div class="btn-group">
      <button class="ctrl-btn on" onclick="obsMedia('play')">播放</button>
      <button class="ctrl-btn" onclick="obsMedia('restart')">重新播放</button>
      <button class="ctrl-btn" onclick="obsMedia('pause')">暫停</button>
      <button class="ctrl-btn off" onclick="obsMedia('stop')">停止</button>
    </div>
  </div>

  <!-- ==================== 攝影機 ==================== -->
  <div class="tab-content" id="tab-camera">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin:0">即時攝影機畫面</div>
      <div style="display:flex;gap:8px">
        <button class="ctrl-btn" id="camToggleBtn" onclick="toggleCamera()">開啟</button>
        <button class="ctrl-btn" onclick="snapshotCamera()">截圖</button>
      </div>
    </div>
    <div id="camContainer" style="position:relative;background:var(--surface2);border-radius:10px;overflow:hidden;border:1px solid var(--border);min-height:200px;display:flex;align-items:center;justify-content:center;">
      <div id="camPlaceholder" style="color:var(--text-dim);font-size:14px;padding:40px;text-align:center;">
        點擊「開啟」查看攝影機畫面<br>
        <span style="font-size:12px;color:var(--text-dim);opacity:0.6;">需要 YOLO 偵測服務運行中</span>
      </div>
      <img id="camFeed" style="display:none;width:100%;height:auto;border-radius:10px;" alt="Camera Feed">
    </div>
    <div id="camStatus" style="font-size:11px;color:var(--text-dim);margin-top:8px;"></div>

    <div class="section-title" style="margin-top:20px">手動餵食控制</div>
    <div style="display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div id="yoloModeLabel" style="font-size:12px;color:var(--orange);font-weight:600;">手動模式</div>
      <div id="feedCounter" style="font-size:13px;color:var(--text);font-weight:600;">
        餵食 <span id="feedCount" style="color:var(--green);font-size:18px;">0</span> 次
        <span style="color:var(--text-dim);font-size:11px;margin-left:4px;">
          ( <span id="feedVeg" style="color:var(--green);">0</span> 菜
          / <span id="feedBeef" style="color:var(--orange);">0</span> 丸
          / <span id="feedReject" style="color:var(--red);">0</span> 拒 )
        </span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <button class="ctrl-btn" onclick="manualFeed('vegetable')" style="padding:20px 12px;font-size:15px;font-weight:600;background:var(--green);color:#0f1117;border-color:var(--green);">吃青菜</button>
      <button class="ctrl-btn" onclick="manualFeed('beef')" style="padding:20px 12px;font-size:15px;font-weight:600;background:var(--orange);color:#0f1117;border-color:var(--orange);">吃丸子</button>
      <button class="ctrl-btn" onclick="manualFeed('reject')" style="padding:20px 12px;font-size:15px;font-weight:600;background:var(--red);color:#fff;border-color:var(--red);">不吃</button>
    </div>

    <div style="margin-top:16px;">
      <button class="ctrl-btn" onclick="endInteraction()" style="width:100%;padding:16px;font-size:16px;font-weight:700;background:var(--accent);color:#fff;border-color:var(--accent);">結束互動</button>
    </div>

    <div id="camSnapshots" style="margin-top:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;"></div>
  </div>

  <!-- ==================== 日誌 ==================== -->
  <div class="tab-content" id="tab-log">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title" style="margin:0">事件日誌</div>
      <button class="log-clear" onclick="clearLog()">清除</button>
    </div>
    <div class="log-list" id="logEntries"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    // ==================================================
    //  Tab 切換
    // ==================================================
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ==================================================
    //  Toast
    // ==================================================
    const toastEl = document.getElementById('toast');
    let toastTimer = null;

    function showToast(msg, type) {
      toastEl.textContent = msg;
      toastEl.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ==================================================
    //  WebSocket
    // ==================================================
    const connDot = document.getElementById('connDot');
    const connLabel = document.getElementById('connLabel');
    const bridgeStatus = document.getElementById('bridgeStatus');
    const bridgeDot = document.getElementById('bridgeDot');
    const bridgeLabel = document.getElementById('bridgeLabel');

    let ws = null;
    let reconnectTimer = null;
    let isCloudMode = false;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host + '/ws');

      ws.onopen = () => {
        connDot.classList.add('connected');
        connLabel.textContent = '已連線';
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onclose = () => {
        connDot.classList.remove('connected');
        connLabel.textContent = '已斷線';
        if (!reconnectTimer) {
          reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 3000);
        }
      };

      ws.onerror = () => ws.close();

      ws.onmessage = (e) => {
        try { handleMessage(JSON.parse(e.data)); } catch {}
      };
    }

    function requestStatus() {
      if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'getStatus' }));
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'init':
          renderDevices(msg.payload.devices);
          renderScenes(msg.payload.scenes);
          renderLogBatch(msg.payload.events);
          if (msg.payload.cloudMode) {
            isCloudMode = true;
            updateBridge(msg.payload.bridgeConnected);
          }
          break;
        case 'event':
          appendLog(msg.payload);
          if (msg.payload.event === 'bridge:connected') updateBridge(true);
          if (msg.payload.event === 'bridge:disconnected') updateBridge(false);
          if (msg.payload.event === 'bridge:devicesRegistered') requestStatus();
          if (msg.payload.event.endsWith(':status')) {
            requestStatus();
            const evtId = msg.payload.event.replace(':status', '');
            if (wizIds.includes(evtId)) updateWizDeviceStatus(msg.payload.data, msg.payload.event);
          }
          break;
        case 'status':
          renderDevices(msg.payload.devices);
          renderScenes(msg.payload.scenes);
          break;
      }
    }

    function updateBridge(connected) {
      if (!isCloudMode) return;
      bridgeStatus.style.display = 'flex';
      bridgeDot.classList.toggle('connected', connected);
      bridgeLabel.textContent = connected ? 'Bridge OK' : 'Bridge OFF';
    }

    // ==================================================
    //  裝置渲染
    // ==================================================
    const deviceList = document.getElementById('deviceList');

    function renderDevices(devices) {
      updateWizTargets(devices);
      if (devices.length === 0 && isCloudMode) {
        deviceList.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:13px;">等待 Bridge 連線...</div>';
        return;
      }
      deviceList.innerHTML = devices.map(d => `
        <div class="device-card">
          <div class="device-header">
            <span class="device-name">${d.id}</span>
            <span class="status-badge ${d.status}">${d.status}</span>
          </div>
          <div class="device-type">${d.type}${d.remote ? ' (remote)' : ''}</div>
          ${d.isPlaying ? '<div class="device-extra" style="color:var(--orange)">Playing: ' + (d.currentFile || '') + '</div>' : ''}
          ${d.authenticated === false ? '<div class="device-extra" style="color:var(--red)">未認證</div>' : ''}
        </div>
      `).join('');
    }

    // ==================================================
    //  場景渲染
    // ==================================================
    const sceneContainer = document.getElementById('sceneContainer');

    function renderScenes(scenes) {
      const groups = {
        'Playback': scenes.filter(s => s.name.startsWith('play_day')),
        'VTube Studio': scenes.filter(s => s.name.startsWith('vts_')),
        'Interactive': scenes.filter(s => s.trigger),
        'System': scenes.filter(s =>
          !s.name.startsWith('play_day') && !s.name.startsWith('vts_') && !s.trigger
          && s.name !== 'start' && s.name !== 'all_off'
        ),
      };

      let html = '';
      for (const [group, items] of Object.entries(groups)) {
        if (items.length === 0) continue;
        html += '<div class="scene-group-label">' + group + '</div>';
        html += '<div class="scene-grid">';
        for (const s of items) {
          html += `
            <div class="scene-btn" onclick="triggerScene('${s.name}')">
              <div class="name">${s.description || s.name}</div>
              <div class="desc">${s.actionCount} actions${s.trigger ? ' / auto' : ''}</div>
            </div>
          `;
        }
        html += '</div>';
      }
      sceneContainer.innerHTML = html;
    }

    // ==================================================
    //  事件日誌
    // ==================================================
    const logEntries = document.getElementById('logEntries');
    const MAX_LOG = 200;

    function renderLogBatch(events) {
      logEntries.innerHTML = '';
      for (const ev of events) appendLog(ev, false);
    }

    function appendLog(entry, prepend = true) {
      const div = document.createElement('div');
      div.className = 'log-entry';
      const time = new Date(entry.timestamp).toLocaleTimeString();
      div.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-event">${entry.event}</span>
        <span class="log-data">${JSON.stringify(entry.data).substring(0, 60)}</span>
      `;
      if (prepend) {
        logEntries.prepend(div);
        while (logEntries.children.length > MAX_LOG) logEntries.removeChild(logEntries.lastChild);
      } else {
        logEntries.appendChild(div);
      }
    }

    window.clearLog = function () { logEntries.innerHTML = ''; };

    // ==================================================
    //  裝置執行
    // ==================================================
    function executeDevice(deviceId, action, params) {
      if (ws?.readyState !== 1) return showToast('WebSocket 未連線', 'error');
      ws.send(JSON.stringify({
        type: 'executeDevice',
        payload: { deviceId, action, params },
      }));
      showToast(deviceId + ' → ' + action);
    }

    // ==================================================
    //  場景觸發
    // ==================================================
    window.triggerScene = function (name) {
      if (ws?.readyState !== 1) return showToast('WebSocket 未連線', 'error');
      ws.send(JSON.stringify({ type: 'triggerScene', payload: { sceneName: name } }));
      showToast('場景: ' + name, 'success');
    };

    // ==================================================
    //  VTube Studio
    // ==================================================
    window.vtsExpression = function (file) {
      executeDevice('vtubestudio', 'setExpression', { file, active: true, fadeTime: 0.3, zoomOnExpression: false });
    };

    window.vtsHotkey = function (name) {
      executeDevice('vtubestudio', 'triggerHotkey', { name });
    };

    window.vtsRemoveAllExpressions = function () {
      executeDevice('vtubestudio', 'removeAllExpressions', { fadeTime: 0.25 });
    };

    window.vtsMoveModel = function () {
      executeDevice('vtubestudio', 'moveModel', {
        timeInSeconds: 0.5,
        positionX: parseFloat(document.getElementById('vtsPosX').value) || 0,
        positionY: parseFloat(document.getElementById('vtsPosY').value) || 0,
        rotation: parseFloat(document.getElementById('vtsRot').value) || 0,
        size: parseFloat(document.getElementById('vtsSize').value) || 0,
      });
    };

    window.vtsTint = function () {
      const hex = document.getElementById('vtsTintColor').value;
      executeDevice('vtubestudio', 'tintArtMesh', {
        colorTint: {
          colorR: parseInt(hex.slice(1, 3), 16),
          colorG: parseInt(hex.slice(3, 5), 16),
          colorB: parseInt(hex.slice(5, 7), 16),
          colorA: 255,
        },
        artMeshMatcher: { tintAll: true },
      });
    };

    window.vtsTintReset = function () {
      executeDevice('vtubestudio', 'tintArtMesh', {
        colorTint: { colorR: 255, colorG: 255, colorB: 255, colorA: 255 },
        artMeshMatcher: { tintAll: true },
      });
    };

    // ==================================================
    //  Wiz Light
    // ==================================================
    let wizIds = [];
    let wizTarget = 'all';
    const wizMeta = {};
    const wizStatuses = {};

    function updateWizTargets(devices) {
      const wizDevices = devices.filter(d => d.type === 'WizLightDevice');
      const ids = wizDevices.map(d => d.id);
      if (ids.length === wizIds.length && ids.every((id, i) => id === wizIds[i])) return;
      wizIds = ids;
      wizDevices.forEach(d => { wizMeta[d.id] = d; });

      const group = document.getElementById('wizTargetGroup');
      if (!group) return;

      let html = '<button class="target-btn active" data-target="all" onclick="wizSetTarget(\'all\')">全部</button>';

      const hasSpotlights = wizDevices.some(d => d.group === 'spotlights');
      const hasBulbs = wizDevices.some(d => d.group === 'bulbs');
      const hasS1 = ids.includes('spotlight_1') && ids.includes('bulb_2');
      const hasS2 = ids.includes('spotlight_2') && ids.includes('bulb_3');

      if (hasSpotlights) html += '<button class="target-btn" data-target="spotlights" onclick="wizSetTarget(\'spotlights\')">聚光燈</button>';
      if (hasS1) html += '<button class="target-btn" data-target="scene1" onclick="wizSetTarget(\'scene1\')">情境一</button>';
      if (hasS2) html += '<button class="target-btn" data-target="scene2" onclick="wizSetTarget(\'scene2\')">情境二</button>';
      if (hasBulbs) html += '<button class="target-btn" data-target="bulbs" onclick="wizSetTarget(\'bulbs\')">壁燈</button>';

      ids.forEach(id => {
        const label = wizMeta[id]?.label || id;
        html += '<button class="target-btn" data-target="' + id + '" onclick="wizSetTarget(\'' + id + '\')">' + label + '</button>';
      });

      group.innerHTML = html;
      updateWizStatusBar();
    }

    window.wizSetTarget = function (target) {
      wizTarget = target;
      document.querySelectorAll('.target-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.target === target);
      });
    };

    function wizExec(action, params) {
      if (wizTarget === 'all') {
        executeDevice('wizlight_all', action, params);
      } else if (wizTarget === 'spotlights') {
        executeDevice('wizlight_spotlights', action, params);
      } else if (wizTarget === 'scene1') {
        ['spotlight_1', 'bulb_2'].filter(id => wizIds.includes(id)).forEach(id => executeDevice(id, action, params));
      } else if (wizTarget === 'scene2') {
        ['spotlight_2', 'bulb_3'].filter(id => wizIds.includes(id)).forEach(id => executeDevice(id, action, params));
      } else if (wizTarget === 'bulbs') {
        executeDevice('wizlight_bulbs', action, params);
      } else {
        executeDevice(wizTarget, action, params);
      }
    }

    function updateWizDeviceStatus(data, event) {
      const id = event?.replace(':status', '') || '';
      if (id) wizStatuses[id] = data;
      updateWizStatusBar();
    }

    function updateWizStatusBar() {
      const bar = document.getElementById('wizStatusBar');
      if (!bar) return;
      if (wizIds.length === 0) { bar.textContent = '掃描中...'; return; }
      bar.textContent = wizIds.map(id => {
        const s = wizStatuses[id];
        const label = wizMeta[id]?.label || id;
        return s ? label + ': ' + s.status : label + ': --';
      }).join(' | ');
    }

    window.wizPower = function (state) { wizExec(state, {}); };
    window.wizBrightness = function (val) { wizExec('setBrightness', { brightness: Number(val) }); };

    window.wizColor = function () {
      const hex = document.getElementById('wizColorPicker').value;
      const brightness = Number(document.getElementById('wizBrSlider').value);
      wizExec('setColor', {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
        brightness,
      });
    };

    window.wizTemp = function (temp) {
      const brightness = Number(document.getElementById('wizBrSlider').value);
      wizExec('setTemp', { temp, brightness });
    };

    window.wizScene = function (sceneId) { wizExec('setScene', { sceneId }); };

    // ==================================================
    //  OBS
    // ==================================================
    window.obsSwitch = function (sceneName) {
      executeDevice('obs', 'switchScene', { sceneName });
    };

    window.obsMedia = function (action) {
      const inputName = document.getElementById('obsMediaInput').value.trim();
      if (!inputName) return showToast('請輸入媒體來源名稱', 'error');
      const actionMap = {
        play: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY',
        pause: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE',
        stop: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_STOP',
        restart: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_RESTART',
      };
      executeDevice('obs', 'triggerMediaInput', {
        inputName,
        mediaAction: actionMap[action],
      });
    };

    // ==================================================
    //  Camera
    // ==================================================
    let camActive = false;
    const camFeed = document.getElementById('camFeed');
    const camPlaceholder = document.getElementById('camPlaceholder');
    const camToggleBtn = document.getElementById('camToggleBtn');
    const camStatus = document.getElementById('camStatus');
    const camSnapshots = document.getElementById('camSnapshots');

    let camStartCancel = false;

    async function waitForCameraReady(maxSeconds) {
      const start = Date.now();
      const deadline = start + maxSeconds * 1000;
      let attempt = 0;
      while (Date.now() < deadline && !camStartCancel) {
        attempt++;
        const elapsed = Math.round((Date.now() - start) / 1000);
        camStatus.textContent = '啟動 YOLO 攝影機中... (' + elapsed + 's / 嘗試 ' + attempt + ')';
        try {
          const res = await fetch('/api/camera/snapshot?' + Date.now(), { cache: 'no-store' });
          if (res.ok) return true;
        } catch (e) {}
        await new Promise(r => setTimeout(r, 2000));
      }
      return false;
    }

    window.toggleCamera = async function () {
      if (camActive) {
        camStartCancel = true;
        camFeed.src = '';
        camFeed.style.display = 'none';
        camPlaceholder.style.display = '';
        camToggleBtn.textContent = '開啟';
        camStatus.textContent = '攝影機已關閉';
        camActive = false;
        return;
      }

      // 先啟動 YOLO server（如果還沒跑）
      camStartCancel = false;
      executeDevice('yolo_detector', 'start', {});

      camPlaceholder.style.display = 'none';
      camFeed.style.display = 'none';
      camToggleBtn.textContent = '關閉';
      camActive = true;
      camStatus.textContent = '啟動 YOLO 攝影機中...';

      // 輪詢等待 server 就緒（最多 30 秒）
      const ready = await waitForCameraReady(30);

      if (camStartCancel || !camActive) return;

      if (!ready) {
        camStatus.textContent = '攝影機啟動逾時';
        camPlaceholder.style.display = '';
        camPlaceholder.innerHTML = '啟動逾時<br><span style="font-size:12px;color:var(--text-dim);opacity:0.6;">YOLO server 沒有在 30 秒內就緒</span>';
        camToggleBtn.textContent = '開啟';
        camActive = false;
        return;
      }

      // server 就緒，載入串流
      camFeed.style.display = 'block';
      camFeed.src = '/api/camera/feed?' + Date.now();
      camStatus.textContent = '串流中';

      camFeed.onload = () => { camStatus.textContent = '串流中'; };
      camFeed.onerror = () => {
        camStatus.textContent = '串流中斷';
      };
    };

    window.snapshotCamera = function () {
      if (!camActive) {
        showToast('請先開啟攝影機', 'error');
        return;
      }
      // 用 canvas 從 img 擷取當前畫面
      const canvas = document.createElement('canvas');
      canvas.width = camFeed.naturalWidth || camFeed.width;
      canvas.height = camFeed.naturalHeight || camFeed.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(camFeed, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);';
      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.cssText = 'width:100%;display:block;';
      const time = document.createElement('div');
      time.textContent = new Date().toLocaleTimeString();
      time.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:2px 6px;text-align:center;';
      wrapper.appendChild(img);
      wrapper.appendChild(time);

      // 點擊可下載
      wrapper.style.cursor = 'pointer';
      wrapper.onclick = () => {
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'snapshot_' + Date.now() + '.jpg';
        a.click();
      };

      camSnapshots.prepend(wrapper);
      showToast('截圖已儲存', 'success');
    };

    // 手動餵食 — 計數 + 觸發場景
    let feedStats = { vegetable: 0, beef: 0, reject: 0 };

    function updateFeedUI() {
      const total = feedStats.vegetable + feedStats.beef;
      document.getElementById('feedCount').textContent = total;
      document.getElementById('feedVeg').textContent = feedStats.vegetable;
      document.getElementById('feedBeef').textContent = feedStats.beef;
      document.getElementById('feedReject').textContent = feedStats.reject;
    }

    window.manualFeed = function (type) {
      if (type === 'vegetable') {
        feedStats.vegetable++;
        triggerScene('yolo_deliver_vegetable');
        showToast('吃青菜 #' + feedStats.vegetable, 'success');
      } else if (type === 'beef') {
        feedStats.beef++;
        triggerScene('yolo_deliver_beef');
        showToast('吃丸子 #' + feedStats.beef, 'success');
      } else if (type === 'reject') {
        feedStats.reject++;
        triggerScene('yolo_reject');
        showToast('不吃 #' + feedStats.reject, 'error');
      }
      updateFeedUI();
    };

    window.endInteraction = function () {
      const total = feedStats.vegetable + feedStats.beef;
      triggerScene('end_interaction');

      // 通知 VisitorSession 互動完成 → 讓 APP 可以開始聊天
      fetch('/api/chat/simulate-ready', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      }).catch(() => {});

      // 關閉攝影機串流
      if (camActive) toggleCamera();

      // 重置計數
      feedStats = { vegetable: 0, beef: 0, reject: 0 };
      updateFeedUI();

      showToast('互動結束 → 進入 APP 聊天（共餵食 ' + total + ' 次）', 'success');
    };

    // 啟動時自動停用 YOLO 自動偵測
    function stopYoloPolling() {
      executeDevice('yolo_detector', 'stop', {});
    }

    // ==================================================
    //  Start
    // ==================================================
    connect();
    setInterval(requestStatus, 10000);

    // 連線成功後停用 YOLO 自動偵測
    setTimeout(stopYoloPolling, 2000);
  })();
  </script>
</body>
</html>
